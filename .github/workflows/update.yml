name: update

# Auto-refreshes predictions, then commits the JSON back to /docs. GitHub Pages
# is configured to serve from branch `main` /docs, so each commit auto-deploys
# (a branch push always triggers Pages' built-in deploy — no extra steps needed).
#
# Cron is best-effort on GitHub (real fire time drifts 10-30 min; 5-min minimum)
# which is fine for a delayed-score tracker. Needs NO secrets: every data source
# is public-domain (martj42 + openfootball + Open-Meteo).
on:
  schedule:
    - cron: "7,37 * * * *"      # twice hourly, off-peak minutes
  workflow_dispatch:
  push:
    branches: [main]
    paths: [src/**, requirements.txt, .github/workflows/**]

permissions:
  contents: write

concurrency:
  group: wc-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Build predictions + site data
        run: python src/build.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}   # optional — enables the live odds blend
      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Nothing built differently from what we already have on this commit → done.
          git diff --quiet -- docs/data && { echo "no data changes"; exit 0; }
          # docs/data holds regenerated artifacts, so OUR fresh build is always
          # authoritative — never merge/rebase it (that conflicts line-by-line
          # against a concurrent run that rebuilt the same JSON). Instead, on each
          # attempt, reset onto the latest main and lay our fresh data back on top.
          # This also survives job re-runs, which check out the original SHA.
          tmp="$(mktemp -d)"
          cp -a docs/data/. "$tmp"/
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            rm -rf docs/data && mkdir -p docs/data
            cp -a "$tmp"/. docs/data/
            git add docs/data
            git diff --staged --quiet && { echo "data already up to date on main"; exit 0; }
            git commit -m "data: auto-refresh $(date -u +%FT%TZ)"
            git push && exit 0
            echo "push rejected; syncing with latest main and retrying…"
          done
          echo "::error::push still rejected after 5 attempts"; exit 1
