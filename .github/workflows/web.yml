name: build-web

# Rebuilds the React/Vite shell into /docs when the web/ source changes. The
# data-refresh workflow (update.yml) stays Python-only and only touches
# docs/data, so frequent data refreshes never run a node build.
on:
  push:
    branches: [main]
    paths: [web/**, .github/workflows/web.yml]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wc-web
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - name: Commit rebuilt shell
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --quiet -- docs/index.html docs/assets && { echo "no shell changes"; exit 0; }
          # The built shell is a regenerated artifact, so OUR fresh build wins —
          # never rebase it against a concurrent update.yml push (that conflicts
          # on hashed asset files). Reset onto latest main and re-apply on top.
          tmp="$(mktemp -d)"
          cp -a docs/index.html "$tmp"/index.html
          cp -a docs/assets "$tmp"/assets
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            rm -rf docs/assets && cp -a "$tmp"/assets docs/assets
            cp -a "$tmp"/index.html docs/index.html
            git add docs/index.html docs/assets
            git diff --staged --quiet && { echo "shell already up to date on main"; exit 0; }
            git commit -m "web: rebuild shell $(date -u +%FT%TZ)"
            git push && exit 0
            echo "push rejected; syncing with latest main and retrying…"
          done
          echo "::error::push still rejected after 5 attempts"; exit 1
