name: build-web

# Rebuilds the React/Vite shell into /docs when the web/ source changes. The
# data-refresh workflow (update.yml) stays Python-only and only touches
# docs/data, so frequent data refreshes never run a node build.
on:
  push:
    branches: [main]
    paths: [web/**, .github/workflows/web.yml]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wc-web
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - name: Commit rebuilt shell
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/assets
          git diff --staged --quiet || git commit -m "web: rebuild shell $(date -u +%FT%TZ)"
          git push
